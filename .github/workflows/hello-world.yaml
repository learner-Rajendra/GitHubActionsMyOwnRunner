name: Windows 11 Python 2.7 Automation

on: [push]

jobs:
  execute-legacy-script:
    # Target your self-hosted Windows 11 runner
    runs-on: [Rajs-win11, self-hosted, lenovo]

    steps:
      # 1. Bring the repository code down to the machine
      - name: Check out repository code
        uses: actions/checkout@v4

      # 2. Run the script directly using the local Python 2.7 path
      - name: Run Python 2.7 Script
        shell: cmd
        run: |
          echo Running script with Python 2.7.1...
          "C:\Python27\python.exe" printo.py
